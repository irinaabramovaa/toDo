<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мои задачи</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <link href="https://fonts.googleapis.com/css?family=Roboto:300" rel="stylesheet">
</head>
<body>
    <h1>📝 Мои задачи ({{ tasks|length }})</h1>

    <form method="POST" action="{{ url_for('task.add_task') }}" class="form-add">
        <input type="text" name="title" placeholder="Новая задача..." required maxlength="200">
        <button type="submit">➕ Добавить</button>
    </form>

    {% if tasks %}
        {% for task in tasks %}
        <div class="task {{ 'completed' if task.done else '' }}">
            <div class="task-title {{ 'line-through text-muted' if task.done else '' }}">
                {{ task.title }}
                <small style="opacity: 0.7;">{{ task.created_at.strftime('%d.%m %H:%M') }}</small>
            </div>
            <div class="task-actions">
                <form method="POST" action="{{ url_for('task.toggle_task', task_id=task.id) }}" style="display: inline;">
                    <button type="submit" class="btn-small btn-success">
                        {{ '✓ Выполнено' if not task.done else '↻ Активна' }}
                    </button>
                </form>
                <form method="POST" action="{{ url_for('task.edit_task', task_id=task.id) }}" style="display: inline;">
                    <input type="text" name="title" value="{{ task.title }}" style="width: 120px; padding: 4px;">
                    <button type="submit" class="btn-small btn-warning">✏️</button>
                </form>
                <form method="POST" action="{{ url_for('task.delete_task', task_id=task.id) }}"
                      style="display: inline;" onsubmit="return confirm('Удалить задачу?')">
                    <button type="submit" class="btn-small btn-danger">🗑️</button>
                </form>
            </div>
        </div>
        {% endfor %}
    {% else %}
        <p style="text-align: center; color: #666; font-style: italic;">
            Пока задач нет. Добавьте первую! 🎯
        </p>
    {% endif %}

    <div style="margin-top: 30px; text-align: center;">
        <a href="{{ url_for('auth.logout') }}" style="color: #007bff;">🚪 Выйти</a>
    </div>
</body>
</html>
