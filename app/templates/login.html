<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Авторизация</title>
<link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
<div class="login-page">
  <div class="form">
  <form class="login-form" method="POST" action="{{ url_for('auth.login') }}">
        <input type="text" name="username" placeholder="Имя пользователя" required maxlength="100">
        <input type="password" name="password" placeholder="Пароль" required>
        <button type="submit">Ввод</button>
    </form>
      <p class="message"> Нет аккаунта?
<a  href="{{ url_for('auth.register') }}">Регистрация</a>
            </p>
    </form>
  </div>
    </div>
</body>
</html>
